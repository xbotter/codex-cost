<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>codex-cost</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="shell">
      <div class="top-actions">
        <button class="icon-button" id="pin-button" type="button" aria-label="Enable always on top"></button>
        <button class="icon-button" id="share-button" type="button" aria-label="Copy dashboard screenshot">
        </button>
      </div>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>

      <div id="capture-target">
        <section class="hero">
          <div class="hero-head">
            <div class="hero-main">
              <p class="eyebrow">Today</p>
              <div class="summary-row">
                <h1 id="summary">$0.00</h1>
                <div class="summary-trend" id="summary-trend"></div>
                <div class="summary-amount-spacer" aria-hidden="true"></div>
              </div>
              <div class="quota-row" id="quota-row" hidden></div>
            </div>
          </div>
        </section>

        <section class="metrics" id="totals"></section>

        <section class="panel">
          <span class="panel-label">Model Breakdown</span>
          <div class="model-list" id="models"></div>
        </section>
      </div>
    </main>
  </body>
</html>
