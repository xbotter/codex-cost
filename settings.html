<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/settings.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>codex-cost settings</title>
    <script type="module" src="/src/settings.ts" defer></script>
  </head>

  <body>
    <main class="settings-shell">
      <section class="settings-panel">
        <div class="settings-header">
          <h1>Quota</h1>
          <p class="settings-copy">Set a daily USD target or cap for the dashboard progress row.</p>
        </div>

        <form id="quota-form" class="settings-form">
          <label class="toggle-row">
            <span class="toggle-copy">
              <strong>Enable quota</strong>
              <span>Show a daily quota row on the dashboard.</span>
            </span>
            <input id="quota-enabled" class="toggle" type="checkbox" />
          </label>

          <div class="field-group">
            <span class="field-label">Mode</span>
            <div class="segmented-control">
              <label class="segment">
                <input type="radio" name="quota-mode" value="target" />
                <span>Target</span>
              </label>
              <label class="segment">
                <input type="radio" name="quota-mode" value="cap" />
                <span>Cap</span>
              </label>
            </div>
          </div>

          <label class="field-group">
            <span class="field-label">Daily USD amount</span>
            <input id="quota-amount" class="text-input" type="number" inputmode="decimal" min="0.01" step="0.01" placeholder="250.00" />
          </label>

          <p class="form-status" id="form-status" role="status" aria-live="polite"></p>

          <div class="actions">
            <button id="save-button" class="save-button" type="submit">Save</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
