<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/settings.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>codex-cost settings</title>
    <script type="module" src="/src/settings.ts" defer></script>
  </head>

  <body>
    <main class="settings-shell">
      <form id="settings-form" class="settings-layout">
        <aside class="provider-sidebar">
          <div class="pane-header">
            <h1>Providers</h1>
          </div>
          <div id="provider-list" class="provider-list"></div>
        </aside>

        <section class="detail-pane">
          <div id="provider-detail" class="provider-detail"></div>
          <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
          <div class="actions">
            <button id="save-button" class="save-button" type="submit">Done</button>
          </div>
        </section>
      </form>
    </main>
  </body>
</html>
