name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: --bundles appimage,deb
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: --bundles nsis
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            args: --target x86_64-apple-darwin --bundles app,dmg
            target: x86_64-apple-darwin
          - platform: macos-latest
            args: --target aarch64-apple-darwin --bundles app,dmg
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npm run build
      - name: Write App Store Connect API key
        if: startsWith(matrix.platform, 'macos')
        run: |
          mkdir -p private_keys
          printf '%s' "${{ secrets.APPLE_API_KEY_P8 }}" > "${{ github.workspace }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8"
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ startsWith(matrix.platform, 'macos') && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ startsWith(matrix.platform, 'macos') && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.platform, 'macos') && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_API_KEY: ${{ startsWith(matrix.platform, 'macos') && secrets.APPLE_API_KEY || '' }}
          APPLE_API_ISSUER: ${{ startsWith(matrix.platform, 'macos') && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY_PATH: ${{ startsWith(matrix.platform, 'macos') && format('{0}/private_keys/AuthKey_{1}.p8', github.workspace, secrets.APPLE_API_KEY) || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: codex-cost ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.args }}
